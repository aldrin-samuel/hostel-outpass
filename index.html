<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hostel Digital Outpass</title>

<!-- Supabase Client -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
width:320px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
background:#4285F4;
color:white;
cursor:pointer;
}

button:hover{
background:#3367d6;
}

#loading{
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Hostel Digital Outpass</h2>

<p>Login using Google</p>

<button id="google-login-btn">
Sign in with Google
</button>

<div id="loading">
Authenticating...
</div>

</div>


<script src="app.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const btn = document.getElementById("google-login-btn")
const loading = document.getElementById("loading")

btn.addEventListener("click",async()=>{

btn.style.display="none"
loading.style.display="block"

await signInWithGoogle()

})

})

</script>

</body>
</html>
