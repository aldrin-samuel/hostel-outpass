<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Hostel Outpass</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 1200px;
        }
        .stat-card {
            text-align: center;
            padding: 2rem;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0.5rem 0;
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-light);
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .detail-label {
            font-weight: 600;
            color: var(--text-light);
        }
        .overdue-banner {
            background-color: var(--danger);
            color: white;
            padding: 0.5rem;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <div class="header-title">Hostel Outpass - Global Admin</div>
        <div class="nav-links">
            <button id="logout-btn">Logout</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card stat-card">
            <div style="color: var(--text-light);">Total Students OUT</div>
            <div id="total-out" class="stat-value" style="color: var(--warning);">0</div>
        </div>
        <div class="card stat-card">
            <div style="color: var(--text-light);">Total OVERDUE</div>
            <div id="total-overdue" class="stat-value" style="color: var(--danger);">0</div>
        </div>
        <div class="card stat-card">
            <div style="color: var(--text-light);">Staff Pending Approval</div>
            <div id="staff-pending-count" class="stat-value" style="color: var(--primary-color);">0</div>
        </div>
    </div>

    <div class="dashboard-container" style="grid-template-columns: 1fr; max-width: 1200px; gap: 2rem;">
        
        <!-- Staff Approval Section -->
        <div class="card" style="max-width: 1000px; margin: 0 auto; width: 100%; border-top: 4px solid var(--primary-color);">
            <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">Pending Staff Registrations</h3>
            <div id="staff-list" class="request-list">
                <p class="text-center" style="color: var(--text-light);">Checking for pending staff...</p>
            </div>
        </div>

        <!-- Students Monitoring Section -->
        <div class="card" style="max-width: 1000px; margin: 0 auto; width: 100%;">
            <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">Students Currently Outside</h3>
            
            <div class="filter-bar">
                <input type="text" id="search-input" class="form-control search-box" placeholder="Search by name or registration number...">
                <select id="filter-select" class="form-control" style="width: auto;">
                    <option value="all">All Out</option>
                    <option value="overdue">Overdue Only</option>
                </select>
            </div>

            <div id="admin-list" class="request-list">
                <p class="text-center" style="color: var(--text-light);">Loading data...</p>
            </div>
        </div>
    </div>

    <!-- Modal for details -->
    <div id="details-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="modal-close" onclick="closeDetails()">&times;</span>
            <h3 id="modal-title" style="color: var(--primary-color); margin-bottom: 1.5rem;">Student Details</h3>
            <div id="modal-overdue" class="overdue-banner hidden">⚠️ OVERDUE FOR RETURN</div>
            <div id="modal-body">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Main Logic -->
    <script src="app.js"></script>
    <script>
        let allOutRequests = [];

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('logout-btn').addEventListener('click', signOut);

            const user = await getCurrentUser();
            if (!user) return;

            // Check if user is actually admin
            const { data: userData } = await db.from('users').select('role').eq('id', user.id).single();
            if (!userData || userData.role !== 'admin') {
                alert("Access Denied: Admin role required.");
                window.location.href = 'role_selection.html';
                return;
            }

            await fetchGlobalData();
            await fetchPendingStaff();

            // Refresh stats and data every 30 seconds
            setInterval(async () => {
                await fetchGlobalData();
                await fetchPendingStaff();
            }, 30000);

            // Update overdue counts every minute even without network if needed
            setInterval(() => {
                updateStats();
                applyFilters(); // refresh overdue badges in list
            }, 60000);

            document.getElementById('search-input').addEventListener('input', applyFilters);
            document.getElementById('filter-select').addEventListener('change', applyFilters);
        });

        async function fetchPendingStaff() {
            const list = document.getElementById('staff-list');
            const { data: pendingStaff, error } = await db
                .from('users')
                .select(`
                    id, 
                    email, 
                    name, 
                    role, 
                    status,
                    department:departments(name)
                `)
                .eq('status', 'pending')
                .neq('role', 'student'); // Admin only approves staff

            if (error) {
                console.error("Error fetching staff:", error);
                return;
            }

            document.getElementById('staff-pending-count').textContent = pendingStaff.length;

            if (pendingStaff.length === 0) {
                list.innerHTML = `<p class="text-center" style="color: var(--text-light);">No pending staff registrations.</p>`;
                return;
            }

            list.innerHTML = '';
            pendingStaff.forEach(staff => {
                const item = document.createElement('div');
                item.className = 'request-item';
                item.innerHTML = `
                    <div class="request-header">
                        <span class="request-purpose">${staff.name || 'No Name'}</span>
                        <span class="badge badge-pending">${staff.role}</span>
                    </div>
                    <div style="font-size: 0.9rem; color: var(--text-light);">
                        Email: ${staff.email} <br>
                        Dept: ${staff.department ? staff.department.name : 'N/A'}
                    </div>
                    <div class="request-actions">
                        <button class="btn btn-success" onclick="approveStaff('${staff.id}')">Approve</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function approveStaff(userId) {
            if (!confirm("Are you sure you want to approve this staff member?")) return;

            const { error } = await db
                .from('users')
                .update({ status: 'approved' })
                .eq('id', userId);

            if (error) {
                alert("Error approving staff: " + error.message);
            } else {
                await fetchPendingStaff();
            }
        }

        async function fetchGlobalData() {
            const list = document.getElementById('admin-list');
            
            // Try to fetch with all columns, but handle missing late_alert_sent gracefully
            let query = db
                .from('outpass_requests')
                .select(`
                    id, 
                    purpose, 
                    out_time, 
                    in_time, 
                    is_outside,
                    returned_to_campus,
                    student:students ( 
                        name, 
                        register_number, 
                        room_number, 
                        phone, 
                        hostel:hostels(name),
                        department:departments(name)
                    )
                `)
                .eq('is_outside', true);

            const { data: requests, error } = await query.order('in_time', { ascending: true });

            if (error) {
                list.innerHTML = `<p class="text-center" style="color: var(--danger);">Error loading data: ${error.message}</p>`;
                return;
            }

            allOutRequests = requests || [];
            updateStats();
            renderList(allOutRequests);
        }

        function updateStats() {
            const now = new Date();
            const overdueCount = allOutRequests.filter(r => new Date(r.in_time) < now).length;
            
            document.getElementById('total-out').textContent = allOutRequests.length;
            document.getElementById('total-overdue').textContent = overdueCount;
        }

        function renderList(requests) {
            const list = document.getElementById('admin-list');
            if (requests.length === 0) {
                list.innerHTML = `<p class="text-center" style="color: var(--text-light);">No matching students found.</p>`;
                return;
            }

            list.innerHTML = '';
            const now = new Date();

            requests.forEach(req => {
                const isOverdue = new Date(req.in_time) < now;
                const item = document.createElement('div');
                item.className = 'request-item';
                if (isOverdue) item.style.borderLeft = '4px solid var(--danger)';

                item.innerHTML = `
                    <div class="request-header">
                        <span class="request-purpose">${req.student.name}</span>
                        ${isOverdue ? '<span class="badge badge-rejected">Overdue</span>' : '<span class="badge badge-approved">Within Time</span>'}
                    </div>
                    <div style="font-size: 0.9rem; color: var(--text-light);">Reg No: ${req.student.register_number} | Room: ${req.student.room_number}</div>
                    <p style="font-size: 0.85rem; margin-top: 0.5rem;"><strong>Return by:</strong> ${new Date(req.in_time).toLocaleString()}</p>
                    <button class="btn btn-secondary mt-3" style="font-size: 0.8rem; padding: 0.5rem;" onclick="viewDetails('${req.id}')">View Full Details</button>
                `;
                list.appendChild(item);
            });
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterType = document.getElementById('filter-select').value;
            const now = new Date();

            let filtered = allOutRequests.filter(req => {
                const matchesSearch = req.student.name.toLowerCase().includes(searchTerm) || 
                                    req.student.register_number.toLowerCase().includes(searchTerm);
                
                const matchesFilter = filterType === 'all' || (filterType === 'overdue' && new Date(req.in_time) < now);
                
                return matchesSearch && matchesFilter;
            });

            renderList(filtered);
        }

        function viewDetails(requestId) {
            const req = allOutRequests.find(r => r.id === requestId);
            if (!req) return;

            const isOverdue = new Date(req.in_time) < new Date();
            const modal = document.getElementById('details-modal');
            const body = document.getElementById('modal-body');
            const overdueBanner = document.getElementById('modal-overdue');

            if (isOverdue) overdueBanner.classList.remove('hidden');
            else overdueBanner.classList.add('hidden');

            body.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">Full Name</span>
                    <span>${req.student.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Reg / Roll Number</span>
                    <span>${req.student.register_number}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Department</span>
                    <span>${req.student.department ? req.student.department.name : 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Hostel & Room</span>
                    <span>${req.student.hostel ? req.student.hostel.name : 'N/A'} - Room ${req.student.room_number}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phone</span>
                    <span>${req.student.phone}</span>
                </div>
                <div style="margin: 1.5rem 0; padding: 1rem; background: var(--bg-color); border-radius: 8px;">
                    <div class="detail-label" style="margin-bottom: 0.5rem;">Outpass Purpose</div>
                    <div>${req.purpose}</div>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Approved Out Time</span>
                    <span>${new Date(req.out_time).toLocaleString()}</span>
                </div>
                <div class="detail-row" style="border-bottom: 2px solid ${isOverdue ? 'var(--danger)' : '#f0f0f0'};">
                    <span class="detail-label" style="color: ${isOverdue ? 'var(--danger)' : 'var(--text-light)'};">Approved Return Time</span>
                    <span style="font-weight: 700;">${new Date(req.in_time).toLocaleString()}</span>
                </div>
            `;

            modal.classList.remove('hidden');
        }

        function closeDetails() {
            document.getElementById('details-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
