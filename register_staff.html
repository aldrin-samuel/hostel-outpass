<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration - Hostel Outpass</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <div class="card animate-fade-in" style="max-width: 600px;">
        <h2 class="card-title">Staff Registration</h2>
        <p class="text-center" style="margin-bottom: 2rem; color: var(--text-light);">Admin approval is required before you can access your dashboard.</p>
        
        <form id="registration-form">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" class="form-control" required placeholder="Dr. John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" required disabled>
            </div>

            <div class="form-group">
                <label for="role">Requested Role</label>
                <select id="role" class="form-control" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="adviser">Class Adviser</option>
                    <option value="hod">HOD</option>
                    <option value="warden">Warden</option>
                    <option value="security">Security</option>
                </select>
            </div>

            <div class="form-group" id="dept-group">
                <label for="department">Department (if applicable)</label>
                <select id="department" class="form-control">
                    <option value="" disabled selected>Select Department</option>
                    <!-- Populated by JS -->
                </select>
                <small style="color: var(--text-light); margin-top: 5px;">Required for HOD and Class Advisers.</small>
            </div>

            <button type="submit" class="btn btn-primary mt-3" id="submit-btn" style="background: linear-gradient(135deg, var(--warning), #fca311); box-shadow: none;">Submit for Approval</button>
            <p id="error-msg" class="text-center mt-3" style="color: var(--danger); font-weight: 600; display: none;"></p>
        </form>
    </div>

    <!-- Main Logic -->
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            // Pre-fill email and name from Google
            document.getElementById('email').value = user.email;
            if (user.user_metadata?.full_name) {
                document.getElementById('fullName').value = user.user_metadata.full_name;
            }

            // Load Departments
            const { data: depts } = await db.from('departments').select('id, name');
            const deptSelect = document.getElementById('department');
            if (depts && deptSelect) {
                depts.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d.id;
                    option.textContent = d.name;
                    deptSelect.appendChild(option);
                });
            }

            // Optional: Show/hide department requirement based on role
            document.getElementById('role').addEventListener('change', (e) => {
                const isAcademic = e.target.value === 'adviser' || e.target.value === 'hod';
                deptSelect.required = isAcademic;
            });

            document.getElementById('registration-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const submitBtn = document.getElementById('submit-btn');
                const errorMsg = document.getElementById('error-msg');
                submitBtn.textContent = 'Submitting...';
                submitBtn.disabled = true;
                errorMsg.style.display = 'none';

                const deptVal = document.getElementById('department').value;

                const staffData = {
                    user_id: user.id,
                    role: document.getElementById('role').value,
                    department_id: deptVal ? deptVal : null
                };

                const { data, error } = await registerStaff(staffData);
                
                if (error) {
                    errorMsg.textContent = error.message || "Failed to submit registration.";
                    errorMsg.style.display = 'block';
                    submitBtn.textContent = 'Submit for Approval';
                    submitBtn.disabled = false;
                } else {
                    window.location.href = 'pending.html';
                }
            });
        });
    </script>
</body>
</html>
