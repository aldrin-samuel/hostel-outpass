<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adviser Dashboard - Hostel Outpass</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <div class="header">
        <div class="header-title">Hostel Outpass - Adviser</div>
        <div class="nav-links">
            <button id="logout-btn">Logout</button>
        </div>
    </div>

    <div class="dashboard-container" style="grid-template-columns: 1fr;">
        <div class="card animate-fade-in" style="max-width: 1000px; margin: 0 auto; width: 100%;">
            <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">Pending Requests (Your Students)</h3>
            
            <div id="requests-list" class="request-list">
                <p class="text-center" style="color: var(--text-light);">Loading requests...</p>
            </div>
        </div>
    </div>

    <!-- Main Logic -->
    <script src="app.js"></script>
    <script>
        let currentAdviserId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('logout-btn').addEventListener('click', signOut);

            const user = await getCurrentUser();
            if (!user) return;
            currentAdviserId = user.id;
            await fetchPendingRequests();
            await fetchAlerts();
        });

        async function fetchPendingRequests() {
            const list = document.getElementById('requests-list');
            
            // Direct filter using adviser_id stored on each request
            const { data: requests, error } = await db
                .from('outpass_requests')
                .select(`
                    id, 
                    purpose, 
                    out_time, 
                    in_time, 
                    created_at,
                    student:students ( name, register_number, room_number, phone )
                `)
                .eq('adviser_id', currentAdviserId)
                .eq('adviser_status', 'pending')
                .eq('final_status', 'pending')
                .order('created_at', { ascending: true });

            if (error) {
                list.innerHTML = `<p class="text-center" style="color: var(--danger);">Error loading requests</p>`;
                return;
            }

            if (!requests || requests.length === 0) {
                list.innerHTML = `<p class="text-center" style="color: var(--text-light);">No pending requests.</p>`;
                return;
            }

            list.innerHTML = '';
            requests.forEach(req => {
                const item = document.createElement('div');
                item.className = `request-item`;
                
                const outDate = new Date(req.out_time).toLocaleString();
                const inDate = new Date(req.in_time).toLocaleString();

                item.innerHTML = `
                    <div class="request-header" style="flex-wrap: wrap;">
                        <div>
                            <span class="request-purpose">${req.student.name} (${req.student.register_number})</span>
                            <div style="font-size: 0.9rem; color: var(--text-light);">Room: ${req.student.room_number} | Phone: ${req.student.phone}</div>
                        </div>
                        <span class="badge badge-pending">Pending</span>
                    </div>
                    <div style="margin-top: 10px;">
                        <strong>Purpose:</strong> ${req.purpose}
                    </div>
                    <div class="request-dates mt-3">
                        <strong>Out:</strong> ${outDate} <br>
                        <strong>In:</strong> ${inDate}
                    </div>
                    <div class="request-actions">
                        <button class="btn btn-success" onclick="updateStatus('${req.id}', 'approved')">Approve</button>
                        <button class="btn btn-danger" onclick="updateStatus('${req.id}', 'rejected')">Reject</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function fetchAlerts() {
            const alerts = await loadAlerts(currentAdviserId, 'adviser');
            if (alerts.length === 0) return;

            // Show alerts section
            const alertsHtml = alerts.map(a => `
                <div class="request-item" style="border-left: 4px solid var(--danger);">
                    <div style="font-weight: 600; color: var(--danger);">⚠️ Late Return Alert</div>
                    <div style="margin-top: 6px;">${a.message}</div>
                    <div style="font-size: 0.8rem; color: var(--text-light); margin-top: 4px;">${new Date(a.created_at).toLocaleString()}</div>
                    <button class="btn btn-secondary" style="margin-top: 8px; padding: 4px 12px; font-size: 0.8rem;" onclick="markAlertRead('${a.id}', this)">Dismiss</button>
                </div>
            `).join('');

            const alertSection = document.createElement('div');
            alertSection.className = 'card animate-fade-in';
            alertSection.style = 'max-width:1000px;margin:0 auto 1.5rem auto;width:100%;border:2px solid var(--danger);';
            alertSection.innerHTML = `<h3 style="color:var(--danger);margin-bottom:1rem;">🔔 Late Return Alerts (${alerts.length})</h3><div>${alertsHtml}</div>`;

            document.querySelector('.dashboard-container').prepend(alertSection);
        }

        async function markAlertRead(alertId, btn) {
            await db.from('alerts').update({ is_read: true }).eq('id', alertId);
            btn.closest('.request-item').remove();
        }

        async function updateStatus(requestId, status) {
            if (!confirm(`Are you sure you want to ${status} this request?`)) return;

            const payload = { adviser_status: status };
            
            if (status === 'rejected') {
                payload.final_status = 'rejected';
            }

            const { error } = await db
                .from('outpass_requests')
                .update(payload)
                .eq('id', requestId);

            if (error) {
                alert('Error updating request: ' + error.message);
            } else {
                await fetchPendingRequests();
            }
        }
    </script>
</body>
</html>
